name: Update RI Legislation Bills

on:
  schedule:
    # Runs every Monday at 8:00 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run bill updater
        run: python update_bills.py

      - name: Commit and push updated files
        run: |
          git config user.name "anonymous"
          git config user.email "anonymous@example.com"
          git add index.html letters.html
          git diff --staged --quiet || git commit -m "Auto-update: RI legislation bills $(date -u '+%Y-%m-%d')"
          git push
